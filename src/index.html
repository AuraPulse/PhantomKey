<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>一键开门</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* 漂亮的深色渐变背景 */
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 核心按钮样式 */
        .door-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            box-shadow: 
                0 10px 25px -5px rgba(37, 99, 235, 0.5),
                inset 0 2px 4px rgba(255,255,255,0.3),
                inset 0 -4px 6px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 6px solid rgba(255,255,255,0.1);
        }

        /* 按钮点击态 */
        .door-btn:active {
            transform: scale(0.92);
            box-shadow: 
                0 4px 12px -2px rgba(37, 99, 235, 0.5),
                inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 成功时的弹跳动画 */
        @keyframes successBounce {
            0% { transform: scale(0.9); }
            40% { transform: scale(1.15); background: #22c55e; box-shadow: 0 0 50px #22c55e; }
            60% { transform: scale(0.95); }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); background: #22c55e; border-color: #4ade80; }
        }

        .animate-success {
            animation: successBounce 0.8s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }

        /* 波纹扩散动画 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to { transform: scale(4); opacity: 0; }
        }

        /* 状态文字 */
        .status-text {
            margin-top: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            opacity: 0.8;
            letter-spacing: 1px;
            transition: all 0.3s;
            height: 30px;
        }

        /* 底部装饰 */
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <!-- 顶部标题 -->
    <div class="absolute top-16 text-center">
        <h1 class="text-2xl font-bold tracking-widest text-blue-100">大门控制系统</h1>
        <p class="text-xs text-blue-300/50 mt-1">SECURE ACCESS</p>
    </div>

    <!-- 核心按钮 -->
    <button id="openBtn" class="door-btn" onclick="openDoor()">
        <!-- 图标容器 -->
        <div id="iconContainer" class="text-6xl drop-shadow-lg transition-transform duration-300">
            <i class="fa-solid fa-fingerprint"></i>
        </div>
        
        <!-- 加载圈 -->
        <div id="spinner" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl"></i>
        </div>
    </button>

    <!-- 状态反馈 -->
    <div id="statusText" class="status-text">点击开门</div>

    <!-- 底部信息 -->
    <div class="footer">Connected to Home Server</div>

    <script>



        // Please add your api url here

    
        const API_URL = "https://ip:port/open_door";

        
        // Please add your api url here




        
        const btn = document.getElementById('openBtn');
        const iconContainer = document.getElementById('iconContainer');
        const spinner = document.getElementById('spinner');
        const statusText = document.getElementById('statusText');
        let isProcessing = false;

        async function openDoor(e) {
            if (isProcessing) return;
            isProcessing = true;

            // 1. 触觉反馈 (如果有，注意部分浏览器禁止自动播放时的震动)
            try { if (navigator.vibrate) navigator.vibrate(50); } catch(e){}

            // 2. UI 进入加载状态
            iconContainer.style.transform = "scale(0)";
            iconContainer.style.opacity = "0";
            spinner.style.opacity = "1";
            statusText.innerText = "正在连接...";
            statusText.style.color = "#93c5fd"; // 浅蓝

            try {
                // 3. 发起请求
                const response = await fetch(API_URL, {
                    method: 'GET',
                    mode: 'no-cors' 
                });

                // 4. 成功动画
                if (response.ok || response.type === 'opaque') {
                    triggerSuccess();
                } else {
                    throw new Error('Server Error');
                }

            } catch (error) {
                console.error(error);
                triggerError();
            }
        }

        function triggerSuccess() {
            btn.classList.add('animate-success');
            
            setTimeout(() => {
                spinner.style.opacity = "0";
                iconContainer.innerHTML = '<i class="fa-solid fa-check"></i>';
                iconContainer.style.transform = "scale(1)";
                iconContainer.style.opacity = "1";
                statusText.innerText = "开门成功";
                statusText.style.color = "#4ade80"; 
                
                try { if (navigator.vibrate) navigator.vibrate([100, 50, 100]); } catch(e){}
            }, 300);

            setTimeout(resetState, 3000);
        }

        function triggerError() {
            btn.style.background = "linear-gradient(145deg, #ef4444, #dc2626)";
            btn.style.boxShadow = "0 10px 25px -5px rgba(220, 38, 38, 0.5)";
            
            spinner.style.opacity = "0";
            iconContainer.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            iconContainer.style.transform = "scale(1)";
            iconContainer.style.opacity = "1";
            
            statusText.innerText = "连接失败，请重试";
            statusText.style.color = "#f87171"; 
            
            try { if (navigator.vibrate) navigator.vibrate(300); } catch(e){}

            isProcessing = false; 
            setTimeout(resetState, 2000);
        }

        function resetState() {
            isProcessing = false;
            btn.classList.remove('animate-success');
            
            btn.style.background = "";
            btn.style.boxShadow = "";
            btn.style.borderColor = "";
            
            iconContainer.innerHTML = '<i class="fa-solid fa-fingerprint"></i>';
            statusText.innerText = "点击开门";
            statusText.style.color = "white";
        }

        // === 新增：页面加载完成后自动开门 ===
        window.addEventListener('load', () => {
            // 延迟 500ms 执行，让用户能看到按钮和动画过程，体验更好
            setTimeout(() => {
                console.log("Auto triggering door open...");
                openDoor();
            }, 500);
        });

    </script>
</body>
</html>
